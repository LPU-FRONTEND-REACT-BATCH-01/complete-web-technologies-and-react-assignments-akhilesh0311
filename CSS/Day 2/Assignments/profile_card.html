<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <style>
        body {
            background-color: #e2e2e2;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            overflow: hidden;
            padding-bottom: 20px;
        }

        .header-bg {
            background-color: #34495e;
            height: 100px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background-color: #bdc3c7;
            border-radius: 50%;
            border: 4px solid white;
            margin: -50px auto 10px auto;
            display: inline-block;
        }

        .name {
            margin: 0;
            color: #2c3e50;
            font-size: 22px;
        }

        .title {
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .bio {
            padding: 0 20px;
            color: #555;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .follow-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
        }

        .follow-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-bg"></div>
        <div class="profile-img"></div>
        <h2 class="name">Sarah Jenkins</h2>
        <p class="title">UI/UX Designer</p>
        <p class="bio">Passionate creator bringing ideas to life through functional and beautiful interfaces.</p>
        <button class="follow-btn">Follow</button>
    </div>
</body>
</html>
