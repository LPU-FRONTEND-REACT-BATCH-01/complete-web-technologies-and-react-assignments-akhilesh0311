<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Assignment</title>
    <style>
        body { font-family: sans-serif; background-color: #eaeaea; text-align: center; }
        .card {
            background-color: white;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
            display: inline-block;
            box-shadow: 2px 2px 12px rgba(0,0,0,0.1);
        }
        .card h3 { margin-top: 0; color: #333; }
        .card p { color: #666; }
    </style>
</head>
<body>
    <h1>My Schedule & Hobbies Cards</h1>
    
    <div class="card">
        <h3>Schedule</h3>
        <p>Monday: Learn HTML</p>
        <p>Tuesday: Learn CSS</p>
    </div>

    <div class="card">
        <h3>Hobbies</h3>
        <p>1. Coding</p>
        <p>2. Reading</p>
    </div>
</body>
</html>
