<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Signup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .signup-box {
            background-color: #ecf0f1;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            width: 350px;
        }

        .title {
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .desc {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-field {
            width: 90%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
        }

        .submit-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="signup-box">
        <h2 class="title">Stay Updated!</h2>
        <p class="desc">Join our newsletter to get the latest tech news delivered weekly to your inbox.</p>
        
        <form action="#">
            <input type="text" class="input-field" placeholder="Full Name" required>
            <input type="email" class="input-field" placeholder="Email Address" required>
            <button type="submit" class="submit-btn">Subscribe Now</button>
        </form>
    </div>
</body>
</html>
