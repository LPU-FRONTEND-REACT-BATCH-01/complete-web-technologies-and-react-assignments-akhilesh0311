<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Day 1 Practice</title>
    <style>
        /* Internal CSS */
        body {
            background-color: lightgray;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: darkblue;
        }
        .highlight {
            color: red;
            font-weight: bold;
        }
        #unique {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Introduction to CSS</h1>
    <p>This is a normal paragraph.</p>
    <p class="highlight">This paragraph has a class "highlight".</p>
    <p id="unique">This paragraph has an ID "unique".</p>

    <p style="color: green;">This uses inline CSS</p>
</body>
</html>
