<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sticky Nav Assignment</title>
    <style>
        body { margin: 0; font-family: Arial; height: 1500px; }
        .nav {
            position: sticky;
            top: 0;
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .content { padding: 20px; }
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: blue;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="nav">Sticky Navbar - Stays at top when scrolling</div>
    <div class="content">
        <h1>Scroll down to see the effect</h1>
        <p>Keep scrolling...</p>
    </div>
    <a href="#" class="back-to-top">Top</a>
</body>
</html>
