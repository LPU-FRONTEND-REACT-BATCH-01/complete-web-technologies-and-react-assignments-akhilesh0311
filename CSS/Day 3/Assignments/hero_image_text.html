<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Image Overlay</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
        }

        .hero-container {
            position: relative;
            width: 100%;
            height: 500px;
            background-color: #34495e;
            background-image: url('https://via.placeholder.com/1200x500/2c3e50/ffffff?text=Nature+Landscape');
            background-size: cover;
            background-position: center;
        }

        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background-color: rgba(0,0,0,0.4);
            padding: 20px 40px;
            border-radius: 8px;
        }

        .hero-text h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .btn {
            background-color: #e74c3c;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.2em;
            border-radius: 5px;
            display: inline-block;
            margin-top: 15px;
        }

        .btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="hero-container">
        <div class="hero-text">
            <h1>Explore the World</h1>
            <p>Discover amazing places and create unforgettable memories.</p>
            <a href="#" class="btn">Start Your Journey</a>
        </div>
    </div>
</body>
</html>
