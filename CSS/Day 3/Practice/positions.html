<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Positioning</title>
    <style>
        .container { position: relative; height: 300px; border: 2px solid black; }
        .static { background: pink; padding: 10px; }
        .relative { position: relative; top: 20px; left: 20px; background: lightgreen; padding: 10px; }
        .absolute { position: absolute; bottom: 10px; right: 10px; background: lightcoral; padding: 10px; }
        .fixed { position: fixed; top: 0; right: 0; background: yellow; padding: 5px; }
    </style>
</head>
<body>
    <div class="fixed">I am Fixed!</div>
    <h1>Positioning Practice</h1>
    <div class="container">
        <div class="static">Static (Default)</div>
        <div class="relative">Relative (Moved from normal flow)</div>
        <div class="absolute">Absolute (Positioned nearest relative container)</div>
    </div>
</body>
</html>
