<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute and Relative Positioning</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            width: 400px;
            height: 300px;
            background-color: #ecf0f1;
            border: 2px solid #34495e;
            position: relative; /* Acts as the reference point for absolute children */
        }

        .box {
            width: 100px;
            height: 100px;
            color: white;
            text-align: center;
            line-height: 100px;
            font-weight: bold;
        }

        .static-box {
            background-color: #3498db;
            position: static; /* Default */
        }

        .relative-box {
            background-color: #e67e22;
            position: relative;
            top: 20px;
            left: 20px;
        }

        .absolute-box {
            background-color: #e74c3c;
            position: absolute;
            bottom: 10px;
            right: 10px;
        }
    </style>
</head>
<body>
    <h2>CSS Positioning: Relative and Absolute</h2>
    <p>The parent container has <code>position: relative;</code>.</p>
    
    <div class="container">
        <div class="box static-box">Static (Default)</div>
        <div class="box relative-box">Relative</div>
        <div class="box absolute-box">Absolute</div>
    </div>
</body>
</html>
