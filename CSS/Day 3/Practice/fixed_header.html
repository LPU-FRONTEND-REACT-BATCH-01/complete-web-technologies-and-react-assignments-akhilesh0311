<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Positioning</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding-top: 60px; /* To prevent content from hiding under the header */
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .content {
            padding: 20px;
            height: 1500px; /* Make page scrollable */
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <header>
        <h2>Fixed Navigation Header</h2>
    </header>

    <div class="content">
        <h1>Scroll down to see the effect!</h1>
        <p>The header has <code>position: fixed;</code>, which means it remains in the same place even when you scroll the page.</p>
    </div>
</body>
</html>
