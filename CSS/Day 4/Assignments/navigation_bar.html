<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Navigation Bar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            display: flex;
            justify-content: space-between; /* Space out logo and links */
            align-items: center; /* Center items vertically */
            background-color: #2c3e50;
            padding: 15px 30px;
            color: white;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px; /* Space between links */
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .nav-links li a:hover {
            background-color: #34495e;
        }

        .login-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .login-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">BrandName</div>
        
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <button class="login-btn">Login</button>
    </nav>
    
    <div style="padding: 20px;">
        <h1>Flexbox makes navigation bars easy!</h1>
        <p>Notice how `justify-content: space-between` pushes the logo, the list of links, and the login button apart.</p>
    </div>
</body>
</html>
