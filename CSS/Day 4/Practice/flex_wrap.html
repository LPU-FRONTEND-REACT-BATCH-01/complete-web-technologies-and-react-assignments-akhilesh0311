<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Wrap</title>
    <style>
        .flex-container {
            display: flex;
            background-color: #ecf0f1;
            padding: 10px;
            border: 2px solid #bdc3c7;
            width: 400px;
            margin-bottom: 20px;
        }

        .flex-item {
            background-color: #2ecc71;
            color: white;
            padding: 20px;
            margin: 5px;
            width: 100px; /* Fixed width to force wrapping */
            text-align: center;
        }

        .no-wrap {
            flex-wrap: nowrap; /* Default: items shrink to fit */
        }

        .wrap {
            flex-wrap: wrap; /* Items wrap to the next line if not enough space */
        }
    </style>
</head>
<body>
    <h2>Flex Wrap Property</h2>
    <p>Container width is fixed at 400px. Box width is 100px + padding + margins.</p>

    <h3>flex-wrap: nowrap (Default)</h3>
    <p>The items shrink to fit the container.</p>
    <div class="flex-container no-wrap">
        <div class="flex-item">1</div>
        <div class="flex-item">2</div>
        <div class="flex-item">3</div>
        <div class="flex-item">4</div>
        <div class="flex-item">5</div>
    </div>

    <h3>flex-wrap: wrap</h3>
    <p>The items wrap to the next line.</p>
    <div class="flex-container wrap">
        <div class="flex-item">1</div>
        <div class="flex-item">2</div>
        <div class="flex-item">3</div>
        <div class="flex-item">4</div>
        <div class="flex-item">5</div>
    </div>
</body>
</html>
