<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Day 2 Assignment</title>
</head>
<body>
    <h1>Fruit Array Assignment</h1>
    <script>
        let fruits = ["Mango", "Banana", "Apple", "Orange", "Grapes"];

        for (let i = 0; i < fruits.length; i++) {
            console.log("Fruit: " + fruits[i]);
            
            if (fruits[i] === "Apple") {
                console.log("--> We found the Apple!");
            }
        }
    </script>
</body>
</html>
