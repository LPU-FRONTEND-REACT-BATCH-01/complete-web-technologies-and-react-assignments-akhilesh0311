<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Day 2 Practice</title>
</head>
<body>
    <h1>Arrays and Loops Practice</h1>
    <script>
        // Conditionals
        let score = 85;
        if (score >= 90) {
            console.log("A");
        } else if (score >= 80) {
            console.log("B");
        } else {
            console.log("C");
        }

        // Arrays
        let colors = ["Red", "Green", "Blue"];
        console.log("Colors array:", colors);
        colors.push("Yellow"); // Adds to end
        console.log("After push:", colors);
        
        // For Loop
        console.log("Looping array:");
        for (let i = 0; i < colors.length; i++) {
            console.log("- " + colors[i]);
        }
    </script>
</body>
</html>
