<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Day 1 Practice</title>
</head>
<body>
    <h1>Check Your Console!</h1>
    <p>Right click -> Inspect -> Console</p>
    <script>
        // Practice Variables
        var oldWay = "This is var";
        let newWay = "This is let";
        const constantValue = "This cannot change";

        console.log(oldWay);
        console.log(newWay);
        console.log(constantValue);

        // Basic Math
        let a = 10;
        let b = 5;
        console.log("Add:", a + b);
        console.log("Subtract:", a - b);
        console.log("Multiply:", a * b);
        console.log("Divide:", a / b);
    </script>
</body>
</html>
