<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Gallery</title>
</head>
<body>
    <header>
        <h1>Our Creative Works Gallery</h1>
    </header>

    <main>
        <section>
            <h2>Video Projects</h2>
            <article>
                <h3>Short Film: The Journey</h3>
                <video width="480" height="270" controls poster="poster.jpg">
                    <source src="journey.mp4" type="video/mp4">
                </video>
            </article>
            <article>
                <h3>Commercial Setup</h3>
                <video width="480" height="270" controls>
                    <source src="commercial.mp4" type="video/mp4">
                </video>
            </article>
        </section>

        <section>
            <h2>Audio Designs</h2>
            <article>
                <h3>Ambient Soundscapes</h3>
                <audio controls>
                    <source src="ambient.mp3" type="audio/mpeg">
                </audio>
            </article>
            <article>
                <h3>Action Background Music</h3>
                <audio controls>
                    <source src="action.mp3" type="audio/mpeg">
                </audio>
            </article>
        </section>
        
        <section>
            <h2>Featured YouTube Collaboration</h2>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/ScMzIvxBSi4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </section>
    </main>

</body>
</html>
