
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Demo</title>
</head>
<body>

    <h1>Form Demo</h1>

    <form action="submit_form.php" method="POST">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select><br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required><br><br>

        
        <label>City:</label><br>
        <input type="radio" id="city1" name="city" value="newyork">
        <label for="city1">New York</label><br>
        <input type="radio" id="city2" name="city" value="losangeles">
        <label for="city2">Los Angeles</label><br>
        <input type="radio" id="city3" name="city" value="chicago">
        <label for="city3">Chicago</label><br><br>

        
        <label>Skills:</label><br>
        <input type="checkbox" id="skill1" name="skills" value="programming">
        <label for="skill1">Programming</label><br>
        <input type="checkbox" id="skill2" name="skills" value="design">
        <label for="skill2">Design</label><br>
        <input type="checkbox" id="skill3" name="skills" value="management">
        <label for="skill3">Management</label><br><br>

        
        <label for="experience">Years of Experience:</label>
        <input type="range" id="experience" name="experience" min="0" max="50"><br><br>

        <label for="fileUpload" name ="fileUpload">Upload your resume:</label><br><br>
        <input type="file" name="fileUpload"><br><br>
        

        
        


        <input type="reset" value="Reset">

        
        <input type="submit" value="Submit">
    </form>
</html>
