
<!DOCTYPE html>
<html>
<head>
    <title>Grocery Table</title>
</head>
<body>

    <h2>Grocery List</h2>

    <table border="1" cellpadding="10" cellspacing="0">
        <tr>
            <th>S.No</th>
            <th>Item</th>
            <th>Price (₹)</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Rice</td>
            <td>50</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Wheat</td>
            <td>40</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Milk</td>
            <td>30</td>
        </tr>

        <tr>
            <td>4</td>
            <td>Sugar</td>
            <td>45</td>
        </tr>

        <tr>
            <td>5</td>
            <td>Oil</td>
            <td>120</td>
        </tr>

    </table>

</body>
</html>
