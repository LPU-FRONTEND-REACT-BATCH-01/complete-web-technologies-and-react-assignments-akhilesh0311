<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic Layouts</title>
</head>
<body>
    <header>
        <h1>Website Header</h1>
        <nav>
            <a href="#">Home</a> | <a href="#">About</a>
        </nav>
    </header>
    <main>
        <section>
            <h2>Main Section</h2>
            <article>
                <h3>Article Title</h3>
                <p>This is Semantic HTML.</p>
            </article>
        </section>
        <aside>
            <p>Side information goes here.</p>
        </aside>
    </main>
    <footer>
        <p>&copy; 2026 Semantic Example</p>
    </footer>
</body>
</html>
