<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation and Header Elements</title>
</head>
<body>
    <header>
        <h1>Welcome to My Tech Blog</h1>
        <p>Your daily dose of programming tutorials and news.</p>
        
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#tutorials">Tutorials</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home">
            <h2>Latest Posts</h2>
            <p>Welcome to our new website layout utilizing semantic header and nav tags.</p>
        </section>
    </main>
</body>
</html>
