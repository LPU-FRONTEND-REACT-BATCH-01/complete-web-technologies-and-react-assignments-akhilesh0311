<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select and Datalist Forms</title>
</head>
<body>
    <h2>Select Dropdown vs Datalist Attributes</h2>
    
    <form action="#">
        <h3>Traditional Dropdown (Select)</h3>
        <label for="cars">Choose a car to rent:</label>
        <select id="cars" name="cars">
            <option value="volvo">Volvo</option>
            <option value="saab">Saab</option>
            <option value="fiat" selected>Fiat</option>
            <option value="audi">Audi</option>
        </select>

        <hr>

        <h3>Searchable Dropdown (Datalist)</h3>
        <label for="browser">Choose your favorite browser:</label>
        <input list="browsers" name="browser" id="browser">
        
        <!-- The datalist provides suggestions, but users can still type custom values -->
        <datalist id="browsers">
            <option value="Chrome">
            <option value="Firefox">
            <option value="Safari">
            <option value="Edge">
            <option value="Opera">
        </datalist>

        <br><br>
        <input type="submit">
    </form>
</body>
</html>
